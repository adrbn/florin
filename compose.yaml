services:
  db:
    image: postgres:16-alpine
    container_name: florin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: florin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: florin
    ports:
      # Mapped to 5433 on the host to avoid conflict with a system Postgres on 5432.
      # Inside the compose network (and from inside the container), Postgres still listens on 5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - florin-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U florin -d florin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  florin-db-data:
    name: florin-db-data
