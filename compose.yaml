services:
  db:
    image: postgres:16-alpine
    container_name: florin-db
    restart: unless-stopped
    # Bump max_connections above the default of 100 — Next.js dev mode reloads
    # leak postgres-js pools until the singleton in src/db/client.ts kicks in,
    # and any browser tab keeping multiple Suspense boundaries warm holds a
    # handful of connections each. 200 gives plenty of headroom for dev.
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
    environment:
      POSTGRES_USER: florin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: florin
    ports:
      # Mapped to 5433 on the host to avoid conflict with a system Postgres on 5432.
      # Inside the compose network (and from inside the container), Postgres still listens on 5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - florin-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U florin -d florin"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: florin-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network, the db container listens on its internal port 5432.
      DATABASE_URL: postgres://florin:${DB_PASSWORD}@db:5432/florin
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  florin-db-data:
    name: florin-db-data
