<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florin</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      width: 380px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .popup {
      background: #0f1117;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
      overflow: hidden;
      width: 380px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 6px rgba(99, 102, 241, 0.4);
    }

    .brand-name {
      font-size: 13px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #64748b;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 4px rgba(34, 197, 94, 0.5);
    }

    .sync-dot.syncing {
      background: #f59e0b;
      box-shadow: 0 0 4px rgba(245, 158, 11, 0.5);
      animation: pulse 1s infinite;
    }

    .sync-dot.error {
      background: #ef4444;
      box-shadow: 0 0 4px rgba(239, 68, 68, 0.5);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .net-worth-section {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .net-worth-value {
      font-size: 26px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -1px;
      line-height: 1;
    }

    .burn-section {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .burn-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .burn-label {
      font-size: 10px;
      font-weight: 500;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .burn-value {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .transactions-section {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .transactions-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .transaction-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
    }

    .category-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .transaction-info {
      flex: 1;
      min-width: 0;
    }

    .transaction-payee {
      font-size: 12px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transaction-category {
      font-size: 10px;
      color: #64748b;
      margin-top: 1px;
    }

    .transaction-amount {
      font-size: 12px;
      font-weight: 600;
      color: #f87171;
      white-space: nowrap;
    }

    .transaction-amount.income {
      color: #4ade80;
    }

    /* Add transaction form */
    .add-form {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      display: none;
    }

    .add-form.open {
      display: block;
    }

    .form-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .form-row:last-child {
      margin-bottom: 0;
    }

    .form-input, .form-select {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 12px;
      padding: 6px 8px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus, .form-select:focus {
      border-color: #6366f1;
    }

    .form-input::placeholder {
      color: #475569;
    }

    .form-input.flex-1 { flex: 1; }

    .form-select {
      flex: 1;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-select option {
      background: #1e1e2e;
      color: #f1f5f9;
    }

    .form-msg {
      font-size: 11px;
      padding: 4px 0 0;
      display: none;
    }

    .form-msg.success { color: #4ade80; display: block; }
    .form-msg.error { color: #f87171; display: block; }

    /* Actions */
    .actions {
      padding: 10px 16px;
      display: flex;
      gap: 6px;
    }

    .btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 7px;
      border: none;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #818cf8, #8b5cf6);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.07);
      color: #cbd5e1;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #f1f5f9;
    }

    .btn-submit {
      background: #22c55e;
      color: #fff;
      flex: none;
      padding: 6px 14px;
    }

    .btn-submit:hover { background: #16a34a; }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.07);
      color: #94a3b8;
      flex: none;
      padding: 6px 10px;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px 12px;
      gap: 16px;
    }

    .footer-link {
      font-size: 11px;
      color: #475569;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.15s;
      padding: 0;
    }

    .footer-link:hover {
      color: #94a3b8;
    }

    .footer-sep {
      width: 1px;
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
    }

    .skeleton {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .skeleton-text { height: 12px; width: 80px; }
    .skeleton-value { height: 26px; width: 140px; }
  </style>
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="header-brand">
        <div class="brand-dot"></div>
        <span class="brand-name">Florin</span>
      </div>
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel" data-i18n="tray.synced">Synced</span>
      </div>
    </div>

    <div id="content">
      <div class="net-worth-section">
        <div class="section-label" data-i18n="tray.netWorth">Net Worth</div>
        <div class="net-worth-value" id="netWorthValue">
          <span class="skeleton skeleton-value"></span>
        </div>
      </div>

      <div class="burn-section">
        <div class="burn-header">
          <div class="burn-label" data-i18n="tray.monthlyBurn">Monthly Burn</div>
          <span class="burn-value" id="burnValue">
            <span class="skeleton skeleton-text"></span>
          </span>
        </div>
      </div>

      <div class="transactions-section">
        <div class="section-label" data-i18n="tray.recentExpenses" style="margin-bottom: 8px;">Recent Expenses</div>
        <div class="transactions-list" id="transactionsList">
          <div style="font-size:11px;color:#475569;padding:4px 0;" data-i18n="tray.loading">Loading…</div>
        </div>
      </div>

      <!-- Inline add transaction form -->
      <div class="add-form" id="addForm">
        <div class="section-label" data-i18n="tray.quickAdd" style="margin-bottom: 8px;">Quick Add</div>
        <div class="form-row">
          <input class="form-input flex-1" id="inputPayee" type="text" data-i18n-placeholder="tray.payeePlaceholder" placeholder="Payee" />
          <input class="form-input" id="inputAmount" type="number" step="0.01" data-i18n-placeholder="tray.amountPlaceholder" placeholder="Amount" style="width:90px;" />
        </div>
        <div class="form-row">
          <select class="form-select" id="inputAccount">
            <option value="" data-i18n="tray.loadingAccounts">Loading accounts…</option>
          </select>
        </div>
        <div class="form-row">
          <select class="form-select" id="inputCategory">
            <option value="" data-i18n="tray.noCategory">No category</option>
          </select>
          <button class="btn btn-submit" id="btnSubmitTx" data-i18n="tray.addButton">Add</button>
          <button class="btn btn-cancel" id="btnCancelTx">✕</button>
        </div>
        <div class="form-msg" id="formMsg"></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btnSync" data-i18n="tray.syncNow">Sync Now</button>
        <button class="btn btn-secondary" id="btnAdd" data-i18n="tray.addTransaction">+ Transaction</button>
        <button class="btn btn-secondary" id="btnDashboard" data-i18n="tray.openDashboard">Dashboard</button>
      </div>

      <div class="footer">
        <button class="footer-link" id="btnQuit" data-i18n="tray.quit">Quit Florin</button>
      </div>
    </div>
  </div>

  <script>
    const CATEGORY_COLORS = [
      '#6366f1', '#8b5cf6', '#ec4899', '#ef4444',
      '#f97316', '#eab308', '#22c55e', '#14b8a6',
      '#06b6d4', '#3b82f6',
    ]

    // Translations are fetched from the main process (which reads the user's
    // locale from the settings table). Until they arrive we render with the
    // English defaults already baked into the HTML.
    let i18n = {}
    function tr(key, fallback) {
      return i18n[key] ?? fallback ?? key
    }

    async function applyTranslations() {
      if (!window.florin?.getLocaleStrings) return
      try {
        i18n = await window.florin.getLocaleStrings()
      } catch {
        i18n = {}
      }
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n')
        if (key && i18n[key]) el.textContent = i18n[key]
      })
      document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
        const key = el.getAttribute('data-i18n-placeholder')
        if (key && i18n[key]) el.setAttribute('placeholder', i18n[key])
      })
    }

    function formatCurrency(amount) {
      if (amount === null || amount === undefined || isNaN(amount)) return '—'
      return new Intl.NumberFormat('fr-FR', {
        style: 'currency',
        currency: 'EUR',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0,
      }).format(amount)
    }

    function escapeHtml(str) {
      const d = document.createElement('div')
      d.appendChild(document.createTextNode(str))
      return d.innerHTML
    }

    function setSyncState(state) {
      const dot = document.getElementById('syncDot')
      const label = document.getElementById('syncLabel')
      dot.className = 'sync-dot'
      if (state === 'syncing') {
        dot.classList.add('syncing')
        label.textContent = tr('tray.syncing', 'Syncing…')
      } else if (state === 'error') {
        dot.classList.add('error')
        label.textContent = tr('tray.error', 'Error')
      } else {
        label.textContent = tr('tray.synced', 'Synced')
      }
    }

    function renderData(data) {
      if (!data) return

      const { netWorth, burn, topExpenses, reviewCount } = data

      document.getElementById('netWorthValue').textContent =
        formatCurrency(netWorth?.net ?? 0)

      document.getElementById('burnValue').textContent =
        formatCurrency(typeof burn === 'number' ? burn : burn?.amount ?? 0)

      const list = document.getElementById('transactionsList')
      if (topExpenses && topExpenses.length > 0) {
        list.innerHTML = topExpenses.map((tx, i) => {
          const isIncome = (tx.amount ?? 0) > 0
          const payee = tx.payee ?? tr('tray.unknown', 'Unknown')
          const category = tx.categoryName ?? ''
          return `
            <div class="transaction-item">
              <div class="category-dot" style="background:${CATEGORY_COLORS[i % CATEGORY_COLORS.length]}"></div>
              <div class="transaction-info">
                <div class="transaction-payee">${escapeHtml(payee)}</div>
                ${category ? `<div class="transaction-category">${escapeHtml(category)}</div>` : ''}
              </div>
              <div class="transaction-amount ${isIncome ? 'income' : ''}">${formatCurrency(tx.amount)}</div>
            </div>
          `
        }).join('')
      } else {
        list.innerHTML = `<div style="font-size:11px;color:#475569;padding:4px 0;">${escapeHtml(tr('tray.noRecentExpenses', 'No recent expenses'))}</div>`
      }
    }

    async function loadData() {
      if (!window.florin) return
      try {
        const data = await window.florin.getTrayData()
        renderData(data)
      } catch (err) {
        setSyncState('error')
      }
    }

    // --- Sync ---
    document.getElementById('btnSync').addEventListener('click', async () => {
      if (!window.florin) return
      const btn = document.getElementById('btnSync')
      setSyncState('syncing')
      btn.textContent = tr('tray.syncing', 'Syncing…')
      btn.disabled = true
      try {
        const result = await window.florin.syncAll()
        if (result?.success === false) {
          // No bank connections is not a real error
          if (result.error && result.error.includes('No connections')) {
            setSyncState('synced')
          } else {
            setSyncState('error')
          }
        } else {
          await loadData()
          window.florin.dataChanged()
          setSyncState('synced')
        }
      } catch {
        setSyncState('error')
      } finally {
        btn.textContent = tr('tray.syncNow', 'Sync Now')
        btn.disabled = false
      }
    })

    // --- Add Transaction ---
    let accountsLoaded = false
    let categoriesLoaded = false

    async function loadAccounts() {
      if (accountsLoaded || !window.florin) return
      try {
        const accounts = await window.florin.listAccounts()
        const sel = document.getElementById('inputAccount')
        sel.innerHTML = accounts.map(a =>
          `<option value="${a.id}">${escapeHtml(a.name)}</option>`
        ).join('')
        accountsLoaded = true
      } catch { /* ignore */ }
    }

    async function loadCategories() {
      if (categoriesLoaded || !window.florin) return
      try {
        const cats = await window.florin.listCategories()
        const sel = document.getElementById('inputCategory')
        const noneLabel = escapeHtml(tr('tray.noCategory', 'No category'))
        sel.innerHTML = `<option value="">${noneLabel}</option>` + cats.map(c =>
          `<option value="${c.id}">${c.emoji ? c.emoji + ' ' : ''}${escapeHtml(c.groupName)} / ${escapeHtml(c.name)}</option>`
        ).join('')
        categoriesLoaded = true
      } catch { /* ignore */ }
    }

    function resizeToContent() {
      const h = document.querySelector('.popup')?.offsetHeight
      if (h && window.florin) window.florin.resizeWindow(h)
    }

    document.getElementById('btnAdd').addEventListener('click', async () => {
      const form = document.getElementById('addForm')
      form.classList.toggle('open')
      if (form.classList.contains('open')) {
        await Promise.all([loadAccounts(), loadCategories()])
        document.getElementById('inputPayee').focus()
      }
      setTimeout(resizeToContent, 50)
    })

    document.getElementById('btnCancelTx').addEventListener('click', () => {
      document.getElementById('addForm').classList.remove('open')
      document.getElementById('formMsg').className = 'form-msg'
      document.getElementById('inputPayee').value = ''
      document.getElementById('inputAmount').value = ''
      setTimeout(resizeToContent, 50)
    })

    document.getElementById('btnSubmitTx').addEventListener('click', async () => {
      const payee = document.getElementById('inputPayee').value.trim()
      const amountStr = document.getElementById('inputAmount').value.trim()
      const accountId = document.getElementById('inputAccount').value
      const categoryId = document.getElementById('inputCategory').value
      const msg = document.getElementById('formMsg')

      if (!payee || !amountStr || !accountId) {
        msg.textContent = tr('tray.fillAllFields', 'Fill in all fields')
        msg.className = 'form-msg error'
        return
      }

      const amount = -Math.abs(parseFloat(amountStr))
      if (isNaN(amount)) {
        msg.textContent = tr('tray.invalidAmount', 'Invalid amount')
        msg.className = 'form-msg error'
        return
      }

      try {
        const txInput = { accountId, amount, payee }
        if (categoryId) txInput.categoryId = categoryId
        const result = await window.florin.addTransaction(txInput)
        if (result?.success === false) {
          msg.textContent = result.error || tr('tray.failed', 'Failed')
          msg.className = 'form-msg error'
        } else {
          msg.textContent = tr('tray.added', 'Added!')
          msg.className = 'form-msg success'
          document.getElementById('inputPayee').value = ''
          document.getElementById('inputAmount').value = ''
          await loadData()
          window.florin.dataChanged()
          setTimeout(() => {
            msg.className = 'form-msg'
            document.getElementById('addForm').classList.remove('open')
          }, 1200)
        }
      } catch {
        msg.textContent = tr('tray.failedToAdd', 'Failed to add')
        msg.className = 'form-msg error'
      }
    })

    // --- Dashboard ---
    document.getElementById('btnDashboard').addEventListener('click', () => {
      window.florin?.openDashboard()
    })

    // --- Quit ---
    document.getElementById('btnQuit').addEventListener('click', () => {
      window.florin?.quitApp()
    })

    // --- Refresh on tray click ---
    if (window.florin) {
      window.florin.onRefresh(async () => {
        await applyTranslations()
        loadData()
      })
    }

    applyTranslations().then(loadData)
  </script>
</body>
</html>
