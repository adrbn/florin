appId: com.florin.desktop
productName: Florin
# asar is DISABLED under pnpm. electron-builder resolves `asarUnpack`
# globs through real paths, and with pnpm's symlinked node_modules every
# workspace dep (@florin/core, better-sqlite3's .pnpm/ entry, etc.) lives
# under ../../packages/* or ../../node_modules/.pnpm/ — outside the app
# dir — which trips electron-builder's "must be under appDir" assertion.
# Tried v1.0.2: asar:true with asarUnpack globs for better-sqlite3 +
# dist-main + .next → build fails in AsarPackager.unpackPattern.
# To re-enable: either switch pnpm to `node-linker=hoisted`, or bundle
# the Next.js output with @vercel/nft to flatten the dep tree first.
asar: false
directories:
  output: dist
files:
  - dist-main/**
  - .next/**
  - assets/**
  - tray-ui/**
  - public/**
  - package.json
  - next.config.mjs
  - "node_modules/**"
  - "!node_modules/.pnpm/electron@*/**"
  - "!node_modules/.pnpm/electron-builder@*/**"
  - "!node_modules/.pnpm/esbuild@*/**"
  - "!node_modules/.pnpm/@esbuild/**"
  - "!node_modules/.pnpm/typescript@*/**"
  - "!node_modules/.pnpm/@types/**"
  - "!node_modules/.pnpm/tailwindcss@*/**"
  - "!node_modules/.pnpm/@tailwindcss/**"
extraResources:
  - from: assets/
    to: assets/
mac:
  icon: assets/icon.icns
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - arm64
        - x64
dmg:
  title: Florin
  artifactName: Florin-${version}-${arch}.dmg
# electron-updater reads this to discover new releases. We do NOT use
# electron-builder's own publisher (it auto-creates phantom "1.0.0" draft
# releases) — builds pass `--publish never` and CI uploads DMGs via
# softprops/action-gh-release.
publish:
  provider: github
  owner: adrbn
  repo: florin
