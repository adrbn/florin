appId: com.florin.desktop
productName: Florin
asar: false
directories:
  output: dist
files:
  - dist-main/**
  - .next/**
  - assets/**
  - tray-ui/**
  - public/**
  - package.json
  - next.config.mjs
  - "node_modules/**"
  - "!node_modules/.pnpm/electron@*/**"
  - "!node_modules/.pnpm/electron-builder@*/**"
  - "!node_modules/.pnpm/esbuild@*/**"
  - "!node_modules/.pnpm/@esbuild/**"
  - "!node_modules/.pnpm/typescript@*/**"
  - "!node_modules/.pnpm/@types/**"
  - "!node_modules/.pnpm/tailwindcss@*/**"
  - "!node_modules/.pnpm/@tailwindcss/**"
extraResources:
  - from: assets/
    to: assets/
mac:
  icon: assets/icon.icns
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - arm64
        - x64
dmg:
  title: Florin
  artifactName: Florin-${version}-${arch}.dmg
# electron-updater reads this to discover new releases. We do NOT use
# electron-builder's own publisher (it auto-creates phantom "1.0.0" draft
# releases) — builds pass `--publish never` and CI uploads DMGs via
# softprops/action-gh-release.
publish:
  provider: github
  owner: adrbn
  repo: florin
