appId: com.florin.desktop
productName: Florin
directories:
  output: dist
files:
  - main.cjs
  - dist-main/**
  - .next/**
  - tray-ui/**
  - assets/**
  - package.json
  - next.config.ts
  - node_modules/**
extraResources:
  - from: assets/
    to: assets/
mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - arm64
        - x64
dmg:
  title: Florin
  artifactName: Florin-${version}-${arch}.dmg
publish:
  provider: github
  owner: adrbn
  repo: florin
